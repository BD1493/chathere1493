<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-Time Messenger App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/phosphor-icons"></script>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

    <style>
        :root {
            --primary: #3b82f6; /* Blue-500 */
            --secondary: #10b981; /* Emerald-500 */
            --bg-dark: #1f2937; /* Gray-800 */
            --bg-light: #f9fafb; /* Gray-50 */
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-light);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .app-container {
            width: 100%;
            max-width: 1200px;
            height: 90vh;
            max-height: 800px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            background-color: white;
        }
        /* Mobile adjustments */
        @media (max-width: 768px) {
            .app-container {
                height: 100vh;
                max-height: none;
                border-radius: 0;
            }
            .sidebar {
                width: 100%;
            }
            .main-content {
                width: 100%;
                position: absolute;
                top: 0;
                left: 0;
                z-index: 10;
            }
        }
    </style>
</head>
<body>
    <div id="app" class="app-container">
        </div>

<script>
    // =======================================================================
    // --- Configuration and State ---
    // =======================================================================
    const state = {
        user: null, // Logged in user object
        token: 'your_super_secret_api_key_12345', // API key
        view: 'loading', // Current view: 'auth', 'dashboard', 'chat', 'search', 'admin'
        chat: null, // Current active chat object {chatId, name, participants}
        chatMessages: [], // Messages for the current chat
        dashboardData: null, // Data for dashboard view
        users: null, // User list for admin/search
        onlineUsers: new Set(), // Set of currently online user IDs
        adminData: null, // Data for admin view
        videoFeed: [], // Data for video feed
        loading: false
    };

    // **CRITICAL FIX: Use a relative URL for API calls**
    const API_URL = '/api'; 

    const appEl = document.getElementById('app');

    // =======================================================================
    // --- Utility Functions ---
    // =======================================================================

    async function apiFetch(endpoint, method = 'GET', body = null, requireAuth = true) {
        state.loading = true;
        renderApp(); // Show loading indicator

        const url = `${API_URL}${endpoint}`;
        const headers = {
            'Content-Type': 'application/json',
        };
        if (requireAuth) {
            headers['Authorization'] = `Bearer ${state.token}`;
        }

        const config = { method, headers };
        if (body && method !== 'GET') {
            config.body = JSON.stringify(body);
        }

        try {
            const response = await fetch(url, config);
            state.loading = false;
            if (response.ok) {
                return await response.json();
            } else {
                const errorData = await response.json().catch(() => ({ error: 'Unknown API error' }));
                console.error(`API Error on ${endpoint}:`, errorData.error);
                return { error: errorData.error || 'API call failed' };
            }
        } catch (e) {
            state.loading = false;
            console.error('Network or Parse Error:', e);
            return { error: 'Network or Parse Error: ' + e.name };
        } finally {
            renderApp(); // Hide loading indicator
        }
    }
    
    // --- Simple State Manipulation ---
    function navigateTo(view, data = null) {
        state.view = view;
        if (view === 'chat') {
            state.chat = data;
        }
        renderApp();
    }

    function showToast(message, type = 'success') {
        const toastId = 'toast-message';
        let toastEl = document.getElementById(toastId);
        if (!toastEl) {
            toastEl = document.createElement('div');
            toastEl.id = toastId;
            toastEl.className = 'fixed top-4 right-4 z-50 p-4 rounded-lg shadow-lg text-white transition-opacity duration-300 opacity-0';
            document.body.appendChild(toastEl);
        }

        toastEl.textContent = message;
        toastEl.className = toastEl.className.replace(/bg-\w+-500/g, ''); // Clear existing color
        toastEl.classList.add(type === 'success' ? 'bg-emerald-500' : 'bg-red-500', 'opacity-100');
        
        // Auto-hide
        setTimeout(() => {
            toastEl.classList.remove('opacity-100');
            toastEl.classList.add('opacity-0');
        }, 3000);
    }
    
    function getUserNameById(userId) {
        if (state.dashboardData && state.dashboardData.users) {
            const user = state.dashboardData.users.find(u => u.id === userId);
            if (user) return user.name;
        }
        return 'Unknown User';
    }
    
    function getPartnerId(chat) {
        if (chat && chat.participants) {
            return chat.participants.find(id => id !== state.user.id);
        }
        return null;
    }
    
    // Placeholder function for TOS link
    function showTermsOfService(event) {
        event.preventDefault();
        alert('Terms of Service: By signing up, you agree to treat others with respect, keep your login information secure, and not upload abusive or illegal content. Failure to comply may result in account termination.');
    }

    // =======================================================================
    // --- Socket.IO Connection and Handlers ---
    // =======================================================================
    let socket = null;

    function connectSocket() {
        if (socket) return; // Already connected

        // **CRITICAL FIX: Use default host for Socket.IO connection**
        socket = io({ 
            auth: { token: state.user.id } 
        });

        socket.on('connect', () => {
            console.log("Socket connected:", socket.id);
            // Request status for all current chat partners
            if (state.dashboardData && state.dashboardData.chats) {
                state.dashboardData.chats.accepted.forEach(chat => {
                    const partnerId = getPartnerId(chat);
                    if (partnerId) socket.emit('check_status', partnerId);
                });
            }
        });

        socket.on('disconnect', () => {
            console.log("Socket disconnected.");
            state.onlineUsers.clear();
            renderApp();
        });

        socket.on('new_message', (message) => {
            if (state.chat && state.chat.chatId === message.chatId) {
                state.chatMessages.push(message);
                renderApp();
                scrollToBottom();
            }
            // Optional: Show a toast notification for messages outside the current chat
        });

        socket.on('user_status_update', (data) => {
            if (data.isOnline) {
                state.onlineUsers.add(data.userId);
            } else {
                state.onlineUsers.delete(data.userId);
            }
            renderApp();
        });

        socket.on('request_update', async () => {
             // Request update is received, so refresh the dashboard data
            await fetchDashboardData();
        });
    }

    function disconnectSocket() {
        if (socket) {
            socket.disconnect();
            socket = null;
        }
        state.onlineUsers.clear();
    }

    // =======================================================================
    // --- Data Fetching and Updating ---
    // =======================================================================

    async function fetchDashboardData() {
        const response = await apiFetch(`/users/${state.user.id}/dashboard`);
        if (response.error) {
            showToast(`Failed to load dashboard: ${response.error}`, 'error');
            return;
        }
        state.dashboardData = response;
        // Rebuild online user list for display
        state.onlineUsers.clear();
        state.onlineUsers.add(state.user.id); // Add self
        if (socket && response.chats && response.chats.accepted) {
            response.chats.accepted.forEach(chat => {
                 const partnerId = getPartnerId(chat);
                 if (partnerId) socket.emit('check_status', partnerId);
            });
        }
        
        if (state.view === 'dashboard' || state.view === 'loading') {
            state.view = 'dashboard';
        }
        renderApp();
    }
    
    async function fetchChatHistory(chatId) {
        const response = await apiFetch(`/chat/history/${chatId}`);
        if (response.error) {
            showToast(`Failed to load history: ${response.error}`, 'error');
            return;
        }
        state.chatMessages = response.messages;
        renderApp();
        scrollToBottom();
    }
    
    async function fetchVideoFeed() {
        const response = await apiFetch('/videos/feed');
        if (response.error) {
            showToast(`Failed to load feed: ${response.error}`, 'error');
            return;
        }
        state.videoFeed = response.feed;
        if (state.view === 'feed' || state.view === 'dashboard') renderApp();
    }

    // =======================================================================
    // --- View Rendering Logic ---
    // =======================================================================

    function renderLoading() { return '<div class="flex items-center justify-center w-full h-full"><i class="ph-spinner ph-spin text-4xl text-blue-500"></i></div>'; }
    
    function renderAuth() { 
        return `
            <div class="w-full h-full flex items-center justify-center bg-gray-50">
                <div class="w-full max-w-md p-8 space-y-6 bg-white rounded-xl shadow-2xl">
                    <h2 class="text-3xl font-extrabold text-gray-900 text-center">
                        Chat Here
                    </h2>
                    <form id="auth-form" onsubmit="event.preventDefault(); handleAuth(event)">
                        <input type="hidden" name="type" value="login">
                        <div class="space-y-4">
                            <input type="text" name="email" id="email-username-input" placeholder="Email or Username" required class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-blue-500 focus:border-blue-500">
                            <input type="password" name="password" placeholder="Password" required class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-blue-500 focus:border-blue-500">
                            
                            <div id="signup-fields" class="space-y-4 hidden">
                                <input type="text" name="name" placeholder="Name" class="w-full px-4 py-3 border border-gray-300 rounded-lg">
                                <input type="number" name="age" placeholder="Age" class="w-full px-4 py-3 border border-gray-300 rounded-lg">
                                <div class="flex items-center">
                                    <input type="checkbox" id="tos-accepted" name="tosAccepted" class="w-4 h-4 text-blue-600 border-gray-300 rounded focus:ring-blue-500">
                                    <label for="tos-accepted" class="ml-2 block text-sm text-gray-900">
                                        I agree to the <a href="#" onclick="showTermsOfService(event)" class="font-medium text-blue-600 hover:text-blue-500">Terms of Service</a>
                                    </label>
                                </div>
                            </div>
                        </div>
                        <button type="submit" id="auth-submit" class="w-full mt-6 flex justify-center py-3 px-4 border border-transparent rounded-lg shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500">
                            Log In
                        </button>
                        <p class="mt-4 text-center text-sm text-gray-600">
                            <a href="#" id="auth-toggle" onclick="toggleAuthMode(event)" class="font-medium text-blue-600 hover:text-blue-500">
                                Need an account? Sign Up
                            </a>
                        </p>
                    </form>
                </div>
            </div>
        `; 
    } 
    
    function renderDashboard() { 
        return `<div class="w-full flex">
            ${renderSidebar()}
            <div id="main-content-area" class="flex-grow flex flex-col bg-gray-50 p-4">
                <h1 class="text-2xl font-bold mb-4">Welcome, ${state.user.name}!</h1>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="bg-white p-4 rounded-lg shadow-md">
                        <h2 class="text-xl font-semibold mb-3 flex items-center">
                            <i class="ph-bell-simple-fill text-yellow-500 mr-2"></i>
                            Chat Requests (${state.dashboardData.pending_requests_in.length})
                        </h2>
                        <div class="space-y-2 max-h-48 overflow-y-auto">
                            ${state.dashboardData.pending_requests_in.length === 0 
                                ? '<p class="text-gray-500">No pending requests.</p>'
                                : state.dashboardData.pending_requests_in.map(req => `
                                    <div class="flex justify-between items-center p-2 border-b last:border-b-0">
                                        <span class="font-medium">${req.senderName}</span>
                                        <div>
                                            <button onclick="handleRequest('${req.senderId}', 'accept')" class="text-green-500 hover:text-green-700 p-1"><i class="ph-check-circle-fill text-lg"></i></button>
                                            <button onclick="handleRequest('${req.senderId}', 'deny')" class="text-red-500 hover:text-red-700 p-1"><i class="ph-x-circle-fill text-lg"></i></button>
                                        </div>
                                    </div>
                                `).join('')}
                        </div>
                    </div>

                    <div class="bg-white p-4 rounded-lg shadow-md">
                        <h2 class="text-xl font-semibold mb-3 flex items-center">
                            <i class="ph-user-circle-fill text-blue-500 mr-2"></i>
                            My Profile
                        </h2>
                        <div class="flex flex-col items-center">
                            <img src="${state.user.profilePic || '/uploads/default.png'}" alt="Profile Picture" class="w-24 h-24 rounded-full object-cover mb-3">
                            <p class="text-lg font-bold">${state.user.name}</p>
                            <p class="text-gray-600">${state.user.email}</p>
                            <form id="profile-pic-form" class="mt-3 w-full max-w-xs" onsubmit="event.preventDefault(); uploadProfilePic()">
                                <input type="file" id="profile-pic-file" name="profile_pic" accept="image/*" class="text-sm w-full border border-gray-300 rounded-lg p-1">
                                <button type="submit" class="w-full mt-2 py-2 px-4 bg-blue-500 text-white rounded-lg hover:bg-blue-600">Upload</button>
                            </form>
                        </div>
                    </div>
                </div>
                
                <h2 class="text-2xl font-bold mt-6 mb-4">Video Feed</h2>
                <div id="video-feed-container" class="space-y-4 max-h-96 overflow-y-auto">
                    ${state.videoFeed.length === 0 
                        ? '<p class="text-gray-500 text-center">No videos yet. <a href="#" onclick="navigateTo(\'feed\')" class="text-blue-500">View Feed</a></p>'
                        : state.videoFeed.slice(0, 3).map(post => `
                            <div class="bg-white p-4 rounded-lg shadow-md flex">
                                <div class="w-1/3 mr-4">
                                    <img src="https://picsum.photos/300/200?random=${post.id}" alt="Video Thumbnail" class="w-full h-auto rounded-lg object-cover">
                                </div>
                                <div class="w-2/3">
                                    <p class="font-bold">${post.caption}</p>
                                    <p class="text-sm text-gray-600">Posted by ${post.posterName}</p>
                                    <a href="${post.url}" target="_blank" class="text-blue-500 text-sm mt-1 inline-block">Watch Video</a>
                                </div>
                            </div>
                        `).join('')}
                </div>
            </div>
        </div>`; 
    }
    
    function renderChat() { 
        return `<div class="w-full flex h-full">
            ${renderSidebar()}
            <div id="main-content-area" class="flex-grow flex flex-col bg-gray-50">
                <div class="p-4 bg-white border-b shadow-sm flex items-center justify-between">
                    <div class="flex items-center">
                        <button onclick="navigateTo('dashboard')" class="md:hidden mr-2 p-2 rounded-full hover:bg-gray-100">
                            <i class="ph-arrow-left text-xl"></i>
                        </button>
                        <img src="${state.chat.partnerProfilePic || '/uploads/default.png'}" alt="Partner" class="w-10 h-10 rounded-full object-cover mr-3">
                        <div>
                            <h2 class="text-lg font-semibold">${state.chat.name}</h2>
                            <p class="text-sm ${state.onlineUsers.has(getPartnerId(state.chat)) ? 'text-green-500' : 'text-gray-500'}">
                                ${state.onlineUsers.has(getPartnerId(state.chat)) ? 'Online' : 'Offline'}
                            </p>
                        </div>
                    </div>
                </div>

                <div id="messages-container" class="flex-grow p-4 space-y-4 overflow-y-auto custom-scrollbar">
                    ${state.chatMessages.map(msg => `
                        <div class="flex ${msg.senderId === state.user.id ? 'justify-end' : 'justify-start'}">
                            <div class="max-w-xs md:max-w-md p-3 rounded-xl ${msg.senderId === state.user.id ? 'bg-blue-500 text-white rounded-br-none' : 'bg-white text-gray-800 rounded-tl-none shadow-md'}">
                                ${msg.senderId !== state.user.id ? `<p class="text-xs font-semibold mb-1">${msg.senderName}</p>` : ''}
                                <p>${msg.text}</p>
                                <p class="text-xs mt-1 opacity-75 text-right">${new Date(msg.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}</p>
                            </div>
                        </div>
                    `).join('')}
                </div>

                <div class="p-4 bg-white border-t">
                    <form onsubmit="event.preventDefault(); sendMessage()">
                        <div class="flex items-center">
                            <input type="text" id="message-input" placeholder="Type a message..." required class="flex-grow px-4 py-3 border border-gray-300 rounded-full focus:ring-blue-500 focus:border-blue-500 mr-3">
                            <button type="submit" class="p-3 bg-blue-500 text-white rounded-full hover:bg-blue-600 transition duration-150">
                                <i class="ph-paper-plane-tilt-fill text-xl"></i>
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>`; 
    }
    
    function renderSidebar() { 
        return `<div id="sidebar" class="w-1/3 min-w-80 border-r bg-white flex flex-col ${window.innerWidth < 768 && state.view === 'chat' ? 'hidden' : ''}">
            <div class="p-4 border-b flex justify-between items-center">
                <h1 class="text-xl font-bold text-gray-800">Chats</h1>
                <div class="flex space-x-2">
                     <button onclick="navigateTo('feed')" class="p-2 rounded-full ${state.view === 'feed' ? 'bg-blue-100 text-blue-600' : 'hover:bg-gray-100 text-gray-600'}">
                        <i class="ph-video-fill text-xl"></i>
                    </button>
                    <button onclick="navigateTo('search')" class="p-2 rounded-full ${state.view === 'search' ? 'bg-blue-100 text-blue-600' : 'hover:bg-gray-100 text-gray-600'}">
                        <i class="ph-magnifying-glass-fill text-xl"></i>
                    </button>
                    <button onclick="logout()" class="p-2 rounded-full hover:bg-red-100 text-red-600">
                        <i class="ph-sign-out-fill text-xl"></i>
                    </button>
                </div>
            </div>

            <div class="flex-grow overflow-y-auto">
                ${state.dashboardData && state.dashboardData.chats 
                    ? state.dashboardData.chats.accepted.map(chat => {
                        const partnerId = getPartnerId(chat);
                        const partner = state.dashboardData.users.find(u => u.id === partnerId);
                        const isOnline = state.onlineUsers.has(partnerId);
                        
                        // Add partner profile pic and name to chat object for use in renderChat
                        const chatData = { 
                            ...chat, 
                            name: partner.name, 
                            partnerProfilePic: partner.profilePic 
                        };

                        return `
                            <div onclick="navigateTo('chat', ${JSON.stringify(chatData).replace(/"/g, "'")})" 
                                class="p-4 flex items-center border-b hover:bg-gray-50 cursor-pointer ${state.chat && state.chat.chatId === chat.chatId ? 'bg-gray-100 border-l-4 border-blue-500' : ''}">
                                
                                <div class="relative mr-3">
                                    <img src="${partner.profilePic || '/uploads/default.png'}" alt="User" class="w-12 h-12 rounded-full object-cover">
                                    <span class="absolute bottom-0 right-0 w-3 h-3 rounded-full border-2 border-white ${isOnline ? 'bg-green-500' : 'bg-gray-400'}"></span>
                                </div>
                                
                                <div class="flex-grow">
                                    <p class="font-semibold">${partner.name}</p>
                                    <p class="text-sm text-gray-500 truncate">${chat.lastMessage}</p>
                                </div>
                            </div>
                        `;
                    }).join('')
                    : '<p class="p-4 text-gray-500">Loading chats...</p>'
                }
            </div>
            
            <div class="md:hidden border-t p-2 flex justify-around bg-white">
                 <button onclick="navigateTo('dashboard')" class="p-3 rounded-full ${state.view === 'dashboard' ? 'bg-blue-100 text-blue-600' : 'hover:bg-gray-100 text-gray-600'}">
                    <i class="ph-house-fill text-xl"></i>
                </button>
                <button onclick="navigateTo('search')" class="p-3 rounded-full ${state.view === 'search' ? 'bg-blue-100 text-blue-600' : 'hover:bg-gray-100 text-gray-600'}">
                    <i class="ph-magnifying-glass-fill text-xl"></i>
                </button>
                <button onclick="navigateTo('feed')" class="p-3 rounded-full ${state.view === 'feed' ? 'bg-blue-100 text-blue-600' : 'hover:bg-gray-100 text-gray-600'}">
                    <i class="ph-video-fill text-xl"></i>
                </button>
                <button onclick="logout()" class="p-3 rounded-full hover:bg-red-100 text-red-600">
                    <i class="ph-sign-out-fill text-xl"></i>
                </button>
            </div>
        </div>`; 
    }
    
    function renderSearch() { 
        return `<div class="w-full flex">
            ${renderSidebar()}
            <div id="main-content-area" class="flex-grow flex flex-col bg-gray-50 p-4">
                <h1 class="text-2xl font-bold mb-4">Find New People</h1>
                
                <form id="search-form" onsubmit="event.preventDefault(); performSearch()" class="mb-4 flex">
                    <input type="text" id="search-input" placeholder="Search by email or name..." required class="flex-grow px-4 py-3 border border-gray-300 rounded-l-lg focus:ring-blue-500 focus:border-blue-500">
                    <button type="submit" class="px-6 py-3 bg-blue-500 text-white rounded-r-lg hover:bg-blue-600 transition duration-150">
                        <i class="ph-magnifying-glass-fill text-xl"></i>
                    </button>
                </form>

                <div id="search-results" class="space-y-3 bg-white p-4 rounded-lg shadow-md max-h-96 overflow-y-auto">
                    ${state.users && state.users.length > 0 
                        ? state.users.map(user => `
                            <div class="flex justify-between items-center p-3 border-b last:border-b-0">
                                <div>
                                    <p class="font-semibold">${user.name}</p>
                                    <p class="text-sm text-gray-500">${user.email}</p>
                                </div>
                                <button onclick="sendChatRequest('${user.id}', '${user.name}')" class="px-4 py-2 bg-emerald-500 text-white rounded-lg text-sm hover:bg-emerald-600">
                                    Send Request
                                </button>
                            </div>
                        `).join('')
                        : '<p class="text-gray-500 text-center">Start searching for users.</p>'}
                </div>
            </div>
        </div>`; 
    }
    
    function renderAdminDashboard() { 
        return `<div class="w-full flex">
            ${renderSidebar()}
            <div id="main-content-area" class="flex-grow flex flex-col bg-gray-50 p-4">
                <h1 class="text-2xl font-bold mb-4 text-red-600">Admin Dashboard (DANGER ZONE)</h1>
                
                <div class="bg-white p-4 rounded-lg shadow-md mb-4">
                    <h2 class="text-xl font-semibold mb-3">User List</h2>
                    ${state.adminData && state.adminData.users ? `
                        <div class="overflow-x-auto">
                            <table class="min-w-full divide-y divide-gray-200">
                                <thead class="bg-gray-50">
                                    <tr>
                                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Name</th>
                                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Email</th>
                                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Actions</th>
                                    </tr>
                                </thead>
                                <tbody class="bg-white divide-y divide-gray-200">
                                    ${state.adminData.users.map(user => `
                                        <tr>
                                            <td class="px-6 py-4 whitespace-nowrap">${user.name} ${user.isAdmin ? '(Admin)' : ''}</td>
                                            <td class="px-6 py-4 whitespace-nowrap">${user.email}</td>
                                            <td class="px-6 py-4 whitespace-nowrap">
                                                ${!user.isAdmin ? `<button onclick="deleteUser('${user.id}')" class="text-red-600 hover:text-red-900 text-sm font-medium">Delete</button>` : 'N/A'}
                                            </td>
                                        </tr>
                                    `).join('')}
                                </tbody>
                            </table>
                        </div>
                    ` : '<p>Enter Admin Key to view users.</p>'}
                </div>

                <form onsubmit="event.preventDefault(); fetchAdminData()" class="bg-white p-4 rounded-lg shadow-md">
                    <h2 class="text-xl font-semibold mb-3">Retrieve Admin Data</h2>
                    <input type="password" id="admin-key-input" placeholder="Enter Admin Secret Key" required class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-red-500 focus:border-red-500 mb-3">
                    <button type="submit" class="w-full py-2 px-4 bg-red-600 text-white rounded-lg hover:bg-red-700">Load Admin Data</button>
                </form>
            </div>
        </div>`;
    }

    // --- Action Handlers ---
    async function handleAuth(event) {
        event.preventDefault();
        const form = event.target;
        const formData = new FormData(form);
        const type = formData.get('type');
        
        const data = {};
        formData.forEach((value, key) => {
            data[key] = value;
        });

        // Specific processing for signup, including TOS
        if (type === 'signup') {
            data.age = parseInt(data.age);
            // Checkbox value is "on" if checked, undefined if not present
            data.tosAccepted = data.tosAccepted === 'on'; 
        }
        
        let endpoint = type === 'login' ? '/auth/login' : '/auth/signup';
        // Auth endpoints do NOT require the API key
        let response = await apiFetch(endpoint, 'POST', data, false);
        
        if (response.success && type === 'login') {
            state.user = response.user;
            connectSocket();
            // Fetch video feed on login to populate dashboard
            await fetchVideoFeed(); 
            await fetchDashboardData();
        } else if (response.success && type === 'signup') {
            showToast('Signup successful! Please log in.');
            document.getElementById('auth-toggle').click(); // Switch back to login view
        } else {
            showToast(response.error || 'Authentication failed.', 'error');
        }
    }
    
    function toggleAuthMode(event) {
        event.preventDefault();
        const form = document.getElementById('auth-form');
        const typeInput = form.querySelector('input[name="type"]');
        const submitButton = document.getElementById('auth-submit');
        const toggleLink = document.getElementById('auth-toggle');
        const signupFields = document.getElementById('signup-fields');
        const emailUsernameInput = document.getElementById('email-username-input');

        if (typeInput.value === 'login') {
            typeInput.value = 'signup';
            submitButton.textContent = 'Sign Up';
            toggleLink.innerHTML = 'Already have an account? Log In';
            signupFields.classList.remove('hidden');
            emailUsernameInput.placeholder = 'Email (Required)'; // Encourage email for server compatibility
        } else {
            typeInput.value = 'login';
            submitButton.textContent = 'Log In';
            toggleLink.innerHTML = 'Need an account? Sign Up';
            signupFields.classList.add('hidden');
            emailUsernameInput.placeholder = 'Email or Username';
        }
    }
    
    async function handleRequest(senderId, action) {
        const response = await apiFetch('/chat/handle_request', 'POST', { targetId: state.user.id, senderId, action });
        if (response.success) {
            showToast(`Request ${action}ed successfully!`);
            await fetchDashboardData(); // Refresh the dashboard
            if (action === 'accept') {
                const partner = state.dashboardData.users.find(u => u.id === senderId);
                const chatData = { 
                    ...response.chat, 
                    name: partner.name, 
                    partnerProfilePic: partner.profilePic 
                };
                navigateTo('chat', chatData);
            }
        } else {
            showToast(response.error || 'Failed to handle request.', 'error');
        }
    }
    
    async function sendMessage() {
        const input = document.getElementById('message-input');
        const text = input.value.trim();
        if (!text || !state.chat) return;

        const message = {
            chatId: state.chat.chatId,
            senderId: state.user.id,
            senderName: state.user.name,
            text: text,
            isGroup: state.chat.type === 'group' // Simple check
        };
        
        // Emit message via socket.io
        socket.emit('send_message', message, (response) => {
            if (response.success) {
                input.value = ''; // Clear input on success
            } else {
                showToast(response.error || 'Failed to send message.', 'error');
            }
        });
    }
    
    function scrollToBottom() {
        const container = document.getElementById('messages-container');
        if (container) {
            setTimeout(() => {
                container.scrollTop = container.scrollHeight;
            }, 50);
        }
    }
    
    async function performSearch() {
        const query = document.getElementById('search-input').value.trim();
        if (!query) return;

        const response = await apiFetch(`/users/search?query=${encodeURIComponent(query)}`);
        if (response.success) {
            // Filter out self and existing partners/pending requests
            const existingIds = new Set(
                state.dashboardData.chats.accepted.map(c => getPartnerId(c))
                .concat(state.dashboardData.pending_requests_in.map(r => r.senderId))
                .concat(state.dashboardData.user.pending_requests_out.map(r => r.targetId))
            );
            
            state.users = response.users.filter(u => 
                u.id !== state.user.id && 
                !existingIds.has(u.id)
            );
        } else {
            showToast(response.error || 'Search failed.', 'error');
        }
        renderApp();
    }
    
    async function sendChatRequest(targetId, targetName) {
        const response = await apiFetch('/chat/request', 'POST', { senderId: state.user.id, senderName: state.user.name, targetId });
        if (response.success) {
            showToast(`Request sent to ${targetName}.`);
            // Notify target user via socket.io
            socket.emit('notify_request', { userId: targetId });
            // Refresh dashboard to update outgoing requests (optional for this simple version)
            await fetchDashboardData();
            navigateTo('dashboard');
        } else {
            showToast(response.error || 'Failed to send request.', 'error');
        }
    }
    
    async function uploadProfilePic() {
        const fileInput = document.getElementById('profile-pic-file');
        if (!fileInput.files.length) return;

        const formData = new FormData();
        formData.append('profile_pic', fileInput.files[0]);
        formData.append('userId', state.user.id);

        state.loading = true;
        renderApp();

        // Must use standard fetch for file upload, not apiFetch
        const url = `${API_URL}/profile/upload_pic`;
        const headers = {
            'Authorization': `Bearer ${state.token}`,
        };
        // NOTE: Content-Type is NOT set for FormData uploads
        
        try {
            const response = await fetch(url, {
                method: 'POST',
                headers,
                body: formData
            });

            const result = await response.json();
            
            if (response.ok && result.success) {
                showToast('Profile picture updated!');
                state.user.profilePic = result.filePath;
            } else {
                showToast(result.error || 'Upload failed.', 'error');
            }
        } catch (e) {
            showToast('Network error during upload.', 'error');
        } finally {
            state.loading = false;
            renderApp();
        }
    }
    
    async function fetchAdminData() {
        const adminKey = document.getElementById('admin-key-input').value;
        if (!adminKey) return;
        
        const response = await apiFetch('/admin/users', 'POST', { adminKey });
        if (response.success) {
            state.adminData = response;
        } else {
            showToast(response.error || 'Admin login failed.', 'error');
            state.adminData = null;
        }
        renderApp();
    }
    
    async function deleteUser(userId) {
        if (!confirm('Are you sure you want to delete this user? This action is irreversible.')) return;
        
        const response = await apiFetch('/admin/delete', 'POST', { userId });
        if (response.success) {
            showToast('User deleted successfully!');
            // Reload admin data
            const adminKey = document.getElementById('admin-key-input').value;
            if (adminKey) await fetchAdminData();
        } else {
            showToast(response.error || 'Failed to delete user.', 'error');
        }
    }

    function logout() {
        state.user = null;
        state.chat = null;
        state.dashboardData = null;
        state.adminData = null;
        disconnectSocket();
        navigateTo('auth');
        showToast('Logged out successfully.');
    }
    
    function checkSession() {
        // Simple session check (no persistent session, just render auth screen)
        if (!state.user) {
            navigateTo('auth');
        } else {
            // Reconnect socket and fetch data if session is active (useful for dev reload)
            connectSocket();
            fetchVideoFeed(); 
            fetchDashboardData();
        }
    }
    
    // --- The Main Render Function ---
    function renderApp() {
        let content = '';
        const currentView = state.view;
        
        switch (currentView) {
            case 'loading':
                content = renderLoading();
                break;
            case 'auth':
                content = renderAuth();
                break;
            case 'dashboard':
                content = renderDashboard();
                break;
            case 'chat':
                content = renderChat();
                break;
            case 'search':
                content = renderSearch();
                break;
            case 'feed':
                 content = renderDashboard(); // Simple reuse for feed view
                break;
            case 'admin':
                content = renderAdminDashboard();
                break;
            default:
                content = renderLoading();
        }
        
        // Render content
        appEl.innerHTML = content;
        
        // Post-render logic for mobile view adjustments and chat scroll
        if (currentView === 'chat' && state.chatMessages.length === 0) {
            fetchChatHistory(state.chat.chatId);
        }
        
        // Mobile view logic to show/hide sidebar vs chat window
        if (window.innerWidth < 768) {
            const sidebar = document.getElementById('sidebar');
            const mainContentArea = document.getElementById('main-content-area');

            if (sidebar && mainContentArea) {
                if (currentView === 'chat') {
                    // In chat view, hide sidebar, show main chat area
                    sidebar.classList.add('hidden');
                    mainContentArea.classList.remove('hidden');
                } else if (currentView !== 'auth' && currentView !== 'loading') {
                    // In dashboard/search/admin view, show sidebar, hide main chat area
                    sidebar.classList.remove('hidden');
                    mainContentArea.classList.remove('flex-grow');
                    mainContentArea.classList.add('hidden'); 
                    
                }
            }
        }
        
        if (state.loading) {
            // Optionally overlay a persistent loading spinner
            // (The individual fetch calls already handle their own loading state)
        }
    }

    // --- Application Entry Point ---
    window.onload = checkSession;
</script>
</body>
</html>
