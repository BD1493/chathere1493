<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Make Friends Messenger App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/phosphor-icons"></script>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

    <style>
        :root {
            --primary: #3b82f6; /* Blue-500 */
            --secondary: #10b981; /* Emerald-500 */
            --bg-dark: #1f2937; /* Gray-800 */
            --bg-light: #f9fafb; /* Gray-50 */
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-light);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .app-container {
            width: 100%;
            max-width: 1200px;
            height: 90vh;
            max-height: 800px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            background-color: white;
        }
        /* Mobile adjustments */
        @media (max-width: 768px) {
            .app-container {
                height: 100vh;
                max-height: none;
                border-radius: 0;
            }
        }
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 50;
        }
        .modal-content {
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }
        .message-bubble {
            max-width: 80%;
            padding: 10px 15px;
            border-radius: 20px;
            word-wrap: break-word;
        }
    </style>
</head>
<body>
    <div id="app" class="app-container">
        </div>
    
    <div id="tos-modal-container"></div>
    <div id="toast-container" class="fixed bottom-5 right-5 z-50 space-y-2"></div>

<script>
    // =======================================================================
    // --- Configuration and State ---
    // =======================================================================
    const state = {
        user: null, 
        token: 'your_super_secret_api_key_12345', 
        view: 'loading', // 'auth', 'dashboard', 'chat', 'search', 'feed', 'admin'
        chat: null, 
        chatMessages: [], 
        dashboardData: null, 
        users: [], 
        onlineUsers: new Set(), 
        adminData: null, 
        videoFeed: [], 
        loading: false,
        searchQuery: '',
        searchResults: []
    };

    // API calls now point to the single PHP file. 
    const API_URL = '/api.php?route='; 
    // Socket.IO server runs on a separate port for WebSockets
    const SOCKET_URL = ':3001';

    const appEl = document.getElementById('app');

    // =======================================================================
    // --- Utility Functions ---
    // =======================================================================

    /**
     * Generic API fetching utility for all HTTP requests.
     */
    async function apiFetch(endpoint, method = 'GET', body = null, requireAuth = true, isFormData = false) {
        state.loading = true;
        renderApp();

        const url = `${API_URL}${endpoint}`; 
        
        const headers = {};
        if (requireAuth) {
            headers['Authorization'] = `Bearer ${state.token}`;
        }
        if (!isFormData) {
            headers['Content-Type'] = 'application/json';
        }

        const config = { method, headers: isFormData ? {} : headers };
        
        if (body) {
            if (isFormData) {
                 // For file uploads, body is a FormData object, no Content-Type header needed
                config.body = body;
            } else if (method !== 'GET') {
                config.body = JSON.stringify(body);
            }
        }

        try {
            const response = await fetch(url, config);
            state.loading = false;
            if (response.ok) {
                return await response.json();
            } else {
                const errorData = await response.json().catch(() => ({ error: 'Unknown API error' }));
                console.error(`API Error on ${endpoint}:`, errorData.error);
                return { error: errorData.error || 'API call failed' };
            }
        } catch (e) {
            state.loading = false;
            console.error('Network or Parse Error:', e);
            return { error: 'Network or Parse Error: ' + e.name };
        } finally {
            renderApp();
        }
    }
    
    function navigateTo(view, data = null) {
        state.view = view;
        if (view === 'chat' && data) {
            state.chat = data;
            fetchChatHistory(data.chatId);
        } else if (view === 'dashboard') {
            fetchDashboardData();
        } else if (view === 'feed') {
            fetchVideoFeed();
        }
        renderApp();
    }

    function showToast(message, type = 'success') {
        const container = document.getElementById('toast-container');
        const color = type === 'success' ? 'bg-emerald-500' : 'bg-red-500';
        const icon = type === 'success' ? 'ph-check-circle' : 'ph-x-circle';
        
        const toast = document.createElement('div');
        toast.className = `flex items-center p-4 rounded-lg shadow-lg text-white ${color}`;
        toast.innerHTML = `<i class="ph-bold ${icon} text-xl mr-3"></i> ${message}`;
        
        container.appendChild(toast);

        setTimeout(() => {
            toast.classList.add('opacity-0', 'transition-opacity', 'duration-500');
            setTimeout(() => toast.remove(), 500);
        }, 3000);
    }

    function getUserNameById(id) {
        if (state.user && state.user.id === id) return 'You';
        const user = state.users.find(u => u.id === id);
        return user ? user.name : 'Unknown User';
    }
    
    function getPartnerId(chat) {
        return chat.participants.find(id => id !== state.user.id);
    }
    
    function getProfilePicUrl(path) {
        // Fallback to a default if no picture is set
        return path ? path : '/uploads/profile_pics/default.png';
    }

    // =======================================================================
    // --- Terms of Service Modal Logic ---
    // =======================================================================
    
    function showTermsOfService(event) {
        event.preventDefault();
        showTermsOfServiceModal();
    }

    function showTermsOfServiceModal() {
        const container = document.getElementById('tos-modal-container');
        if (container.querySelector('.modal-overlay')) return; // Modal already open

        const modalHtml = `
            <div class="modal-overlay" id="tos-modal" role="dialog" aria-modal="true">
                <div class="modal-content">
                    <h2 class="text-2xl font-bold mb-4 text-blue-600">Terms of Service</h2>
                    <div class="text-gray-700 space-y-3 max-h-60 overflow-y-auto pr-2 text-sm">
                        <p>Welcome to Make Friends Messenger App! By continuing to use this service, you agree to the following terms:</p>
                        <ul class="list-disc list-inside space-y-2">
                            <li><strong>Respect:</strong> Treat all users with courtesy and respect.</li>
                            <li><strong>Content:</strong> Do not upload or share abusive, hateful, or illegal content. This includes profile pictures (images/GIFs) and uploaded videos.</li>
                            <li><strong>Privacy:</strong> You are responsible for protecting your login information.</li>
                            <li><strong>Termination:</strong> We reserve the right to terminate accounts that violate these terms without notice.</li>
                        </ul>
                        <p class="font-semibold text-red-500">Note: Failure to comply with these rules will result in account deletion.</p>
                    </div>
                    <button onclick="acceptTermsOfService()" class="w-full mt-6 py-3 px-4 rounded-lg text-sm font-medium text-white bg-emerald-600 hover:bg-emerald-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-emerald-500">
                        I Understand and Accept
                    </button>
                </div>
            </div>
        `;
        container.innerHTML = modalHtml;
    }
    
    function acceptTermsOfService() {
        localStorage.setItem('tos_accepted', 'true');
        document.getElementById('tos-modal-container').innerHTML = ''; // Close the modal
        checkSession(); // Restart session check
    }

    // =======================================================================
    // --- Socket.IO Connection and Handlers (WebSockets) ---
    // =======================================================================
    let socket = null;

    function connectSocket() {
        if (socket) return; 

        // Connect to the Node.js server running on port 3001 for WebSockets
        socket = io(SOCKET_URL, { 
            auth: { token: state.user.id } 
        });

        socket.on('connect', () => {
            console.log("Socket connected:", socket.id);
            // Check status of all chat partners when connecting
            if (state.dashboardData && state.dashboardData.chats) {
                state.dashboardData.chats.accepted.forEach(chat => {
                    const partnerId = getPartnerId(chat);
                    if (partnerId) socket.emit('check_status', partnerId);
                });
            }
        });

        socket.on('disconnect', () => {
            console.log("Socket disconnected.");
            state.onlineUsers.clear();
            renderApp();
        });

        socket.on('new_message', (message) => {
            if (state.chat && state.chat.chatId === message.chatId) {
                state.chatMessages.push(message);
                renderApp();
                scrollToBottom();
            }
        });

        socket.on('user_status_update', (data) => {
            if (data.isOnline) {
                state.onlineUsers.add(data.userId);
            } else {
                state.onlineUsers.delete(data.userId);
            }
            renderApp();
        });

        socket.on('request_update', async () => {
            // Force dashboard refresh when a chat request status changes
            await fetchDashboardData();
            showToast('New chat request update!', 'success');
        });
    }

    function disconnectSocket() {
        if (socket) {
            socket.disconnect();
            socket = null;
        }
        state.onlineUsers.clear();
    }
    
    // =======================================================================
    // --- Data Fetching and Updating ---
    // =======================================================================

    async function fetchDashboardData() {
        if (!state.user) return;
        const response = await apiFetch(`users/${state.user.id}/dashboard`);

        if (response.success) {
            state.dashboardData = response;
            state.users = response.users;
            // Update the user state with fresh data
            state.user = { 
                ...state.user, 
                ...response.user, 
                pending_requests_in: response.user.pending_requests_in // Ensure pending requests is updated
            };
            
            // After data is loaded, check status of all chat partners
            if (socket) {
                response.chats.accepted.forEach(chat => {
                    const partnerId = getPartnerId(chat);
                    if (partnerId) socket.emit('check_status', partnerId);
                });
            }
        } else {
            showToast(response.error, 'error');
        }
        renderApp();
    }

    async function fetchChatHistory(chatId) {
        state.chatMessages = [];
        const response = await apiFetch(`chat/history/${chatId}`);
        if (response.success) {
            state.chatMessages = response.messages;
        } else {
            showToast('Failed to load chat history.', 'error');
        }
        renderApp();
        scrollToBottom();
    }

    async function fetchVideoFeed() {
        const response = await apiFetch('videos/feed');
        if (response.success) {
            state.videoFeed = response.feed;
        } else {
            showToast('Failed to load video feed.', 'error');
        }
        renderApp();
    }

    // =======================================================================
    // --- Action Handlers ---
    // =======================================================================

    async function handleAuth(event) {
        event.preventDefault();
        const form = event.target;
        const formData = new FormData(form);
        const type = formData.get('type');
        
        const data = {};
        formData.forEach((value, key) => { data[key] = value; });

        if (type === 'signup') {
            data.age = parseInt(data.age);
            data.tosAccepted = data.tosAccepted === 'on'; 
            if (!data.tosAccepted) {
                showToast('You must accept the Terms of Service.', 'error');
                return;
            }
        }
        
        let endpoint = type === 'login' ? 'auth/login' : 'auth/signup';
        let response = await apiFetch(endpoint, 'POST', data, false);
        
        if (response.success && type === 'login') {
            state.user = response.user;
            await fetchDashboardData();
            await fetchVideoFeed(); 
            connectSocket();
            navigateTo('dashboard');
        } else if (response.success && type === 'signup') {
            // Verification is now removed. User is immediately ready to log in.
            showToast('Signup successful! You can now log in.');
            document.getElementById('auth-toggle').click(); // Switch back to login view
        } else {
            showToast(response.error || 'Authentication failed.', 'error');
        }
    }

    function toggleAuthMode(event) {
        event.preventDefault();
        const form = document.getElementById('auth-form');
        const typeInput = form.querySelector('input[name="type"]');
        const signupFields = document.getElementById('signup-fields');
        const submitButton = document.getElementById('auth-submit');
        const toggleLink = document.getElementById('auth-toggle');

        if (typeInput.value === 'login') {
            typeInput.value = 'signup';
            signupFields.classList.remove('hidden');
            submitButton.textContent = 'Sign Up';
            toggleLink.innerHTML = 'Already have an account? Log In';
        } else {
            typeInput.value = 'login';
            signupFields.classList.add('hidden');
            submitButton.textContent = 'Log In';
            toggleLink.innerHTML = 'Need an account? Sign Up';
        }
    }

    async function sendChatRequest(targetId) {
        const data = { 
            senderId: state.user.id, 
            senderName: state.user.name, 
            targetId 
        };
        
        const response = await apiFetch('chat/request', 'POST', data);
        if (response.success) {
            showToast(response.message);
            // Notify the target user via socket
            if (socket) {
                 socket.emit('notify_request', { userId: targetId });
            }
            // Update my own dashboard data
            await fetchDashboardData();
        } else {
            showToast(response.error, 'error');
        }
    }

    async function handleRequest(senderId, action) {
        const data = { 
            targetId: state.user.id, 
            senderId, 
            action 
        };
        
        const response = await apiFetch('chat/handle_request', 'POST', data);
        if (response.success) {
            showToast(`Request ${action}ed successfully.`);
            await fetchDashboardData();
            
            if (action === 'accept') {
                navigateTo('chat', response.chat);
            }
        } else {
            showToast(response.error, 'error');
        }
    }

    function scrollToBottom() {
        setTimeout(() => {
            const chatBox = document.getElementById('chat-messages');
            if (chatBox) {
                chatBox.scrollTop = chatBox.scrollHeight;
            }
        }, 50);
    }
    
    function sendMessage(event) {
        event.preventDefault();
        const input = document.getElementById('message-input');
        const text = input.value.trim();
        
        if (!text || !socket || !state.chat) return;

        const message = {
            chatId: state.chat.chatId,
            senderId: state.user.id,
            senderName: state.user.name,
            text: text,
            timestamp: Date.now() 
        };

        // Optimistically update UI
        state.chatMessages.push(message);
        renderApp();
        scrollToBottom();
        input.value = '';

        // Send to server
        socket.emit('send_message', message, (response) => {
            if (!response.success) {
                showToast('Message failed to send.', 'error');
                // TODO: Revert optimistic update or mark as failed
            }
        });
    }

    async function performSearch(event) {
        event.preventDefault();
        const query = document.getElementById('search-input').value.trim();
        state.searchQuery = query;

        if (query.length < 3) {
            state.searchResults = [];
            showToast('Search query must be at least 3 characters.', 'error');
            renderApp();
            return;
        }

        const response = await apiFetch(`users/search?query=${encodeURIComponent(query)}`);
        if (response.success) {
            // Filter out the current user
            state.searchResults = response.users.filter(u => u.id !== state.user.id);
        } else {
            showToast(response.error, 'error');
        }
        renderApp();
    }
    
    async function uploadProfilePic(event) {
        event.preventDefault();
        const fileInput = document.getElementById('profile-pic-file');
        if (!fileInput.files.length) return;

        const formData = new FormData();
        formData.append('profile_pic', fileInput.files[0]);
        formData.append('userId', state.user.id);

        const response = await apiFetch('profile/upload_pic', 'POST', formData, true, true);

        if (response.success) {
            showToast('Profile picture updated!');
            state.user.profilePic = response.filePath;
            renderApp();
        } else {
            showToast(response.error, 'error');
        }
    }
    
    async function postVideo(event) {
        event.preventDefault();
        const form = event.target;
        const fileInput = form.querySelector('#video-file');
        const caption = form.querySelector('#video-caption').value.trim();
        
        if (!fileInput.files.length) {
            showToast('Please select a video file.', 'error');
            return;
        }

        const formData = new FormData();
        formData.append('video_file', fileInput.files[0]);
        formData.append('caption', caption);
        formData.append('posterId', state.user.id);
        formData.append('posterName', state.user.name);

        const response = await apiFetch('videos/upload', 'POST', formData, true, true);

        if (response.success) {
            showToast('Video posted successfully!');
            form.reset();
            await fetchVideoFeed();
        } else {
            showToast(response.error, 'error');
        }
    }
    
    async function fetchAdminData() {
        if (!state.user.isAdmin) return;
        const response = await apiFetch('admin/users', 'POST', {}); // Initial list without full data
        if (response.success) {
            state.adminData = response.users;
        }
        renderApp();
    }
    
    async function deleteUser(userId) {
        if (!confirm('Are you sure you want to delete this user? This action cannot be undone.')) return;
        
        const response = await apiFetch('admin/delete', 'POST', { userId });
        if (response.success) {
            showToast(response.message);
            await fetchAdminData();
        } else {
            showToast(response.error, 'error');
        }
    }

    function logout() {
        state.user = null;
        state.dashboardData = null;
        state.chat = null;
        state.chatMessages = [];
        disconnectSocket();
        navigateTo('auth');
        showToast('You have been logged out.');
    }

    // =======================================================================
    // --- View Rendering Logic ---
    // =======================================================================
    
    function renderLoading() {
        return '<div class="flex items-center justify-center w-full h-full"><i class="ph-spinner ph-spin text-4xl text-blue-500"></i></div>';
    }
    
    function renderAuth() { 
        return `
            <div class="w-full h-full flex items-center justify-center bg-gray-50">
                <div class="w-full max-w-md p-8 space-y-6 bg-white rounded-xl shadow-2xl">
                    <h2 class="text-3xl font-extrabold text-gray-900 text-center">
                        Welcome to Make Friends
                    </h2>
                    <form id="auth-form" onsubmit="event.preventDefault(); handleAuth(event)">
                        <input type="hidden" name="type" value="login">
                        <div class="space-y-4">
                            <input type="email" name="email" placeholder="Email" required class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-blue-500 focus:border-blue-500">
                            <input type="password" name="password" placeholder="Password" required class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-blue-500 focus:border-blue-500">
                            
                            <div id="signup-fields" class="space-y-4 hidden">
                                <input type="text" name="name" placeholder="Name" required class="w-full px-4 py-3 border border-gray-300 rounded-lg">
                                <input type="number" name="age" placeholder="Age" required class="w-full px-4 py-3 border border-gray-300 rounded-lg" min="13">
                                <div class="flex items-center">
                                    <input type="checkbox" id="tos-accepted" name="tosAccepted" class="w-4 h-4 text-blue-600 border-gray-300 rounded focus:ring-blue-500">
                                    <label for="tos-accepted" class="ml-2 block text-sm text-gray-900">
                                        I agree to the <a href="#" onclick="showTermsOfService(event)" class="font-medium text-blue-600 hover:text-blue-500">Terms of Service</a>
                                    </label>
                                </div>
                            </div>
                        </div>
                        <button type="submit" id="auth-submit" class="w-full mt-6 flex justify-center py-3 px-4 border border-transparent rounded-lg shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500">
                            Log In
                        </button>
                        <p class="mt-4 text-center text-sm text-gray-600">
                            <a href="#" id="auth-toggle" onclick="toggleAuthMode(event)" class="font-medium text-blue-600 hover:text-blue-500">
                                Need an account? Sign Up
                            </a>
                        </p>
                    </form>
                </div>
            </div>
        `; 
    } 
    
    function renderSidebar() {
        const chats = state.dashboardData ? state.dashboardData.chats.accepted : [];
        const requests = state.user ? state.user.pending_requests_in : [];
        
        const profilePic = getProfilePicUrl(state.user.profilePic);

        return `
            <div id="sidebar" class="w-full md:w-80 bg-white border-r border-gray-200 flex flex-col h-full md:flex">
                <div class="p-4 border-b border-gray-200 flex items-center justify-between">
                    <div class="flex items-center space-x-3">
                        <img src="${profilePic}" alt="Profile" class="w-10 h-10 rounded-full object-cover border border-blue-400" 
                             onclick="document.getElementById('profile-pic-file').click()">
                        <div>
                            <p class="font-semibold text-gray-900">${state.user.name}</p>
                            <p class="text-xs text-gray-500">${state.onlineUsers.has(state.user.id) ? 'Online' : 'Offline'}</p>
                        </div>
                    </div>
                    <button onclick="logout()" class="text-red-500 hover:text-red-700 p-2 rounded-full hover:bg-red-50 transition">
                        <i class="ph-sign-out text-xl"></i>
                    </button>
                </div>

                <div class="flex justify-around p-3 border-b border-gray-200 text-gray-600">
                    <button onclick="navigateTo('dashboard')" class="${state.view === 'dashboard' ? 'text-blue-600 font-semibold border-b-2 border-blue-600' : 'hover:text-blue-500'} p-1">Chats</button>
                    <button onclick="navigateTo('search')" class="${state.view === 'search' ? 'text-blue-600 font-semibold border-b-2 border-blue-600' : 'hover:text-blue-500'} p-1">Search</button>
                    <button onclick="navigateTo('feed')" class="${state.view === 'feed' ? 'text-blue-600 font-semibold border-b-2 border-blue-600' : 'hover:text-blue-500'} p-1">Feed</button>
                    ${state.user.isAdmin ? `<button onclick="navigateTo('admin')" class="${state.view === 'admin' ? 'text-blue-600 font-semibold border-b-2 border-blue-600' : 'hover:text-blue-500'} p-1">Admin</button>` : ''}
                </div>
                
                ${requests.length > 0 ? `
                    <div class="p-3 bg-yellow-50 border-b border-yellow-200">
                        <p class="font-semibold text-yellow-800 mb-2">Pending Requests (${requests.length})</p>
                        ${requests.map(req => `
                            <div class="flex items-center justify-between p-1 text-sm">
                                <span class="text-gray-700">${req.senderName}</span>
                                <div>
                                    <button onclick="handleRequest('${req.senderId}', 'accept')" class="text-green-600 hover:text-green-800 mr-2"><i class="ph-check-circle text-lg"></i></button>
                                    <button onclick="handleRequest('${req.senderId}', 'reject')" class="text-red-600 hover:text-red-800"><i class="ph-x-circle text-lg"></i></button>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                ` : ''}

                <div class="flex-grow overflow-y-auto">
                    ${chats.length === 0 && requests.length === 0 ? `
                        <p class="text-center text-gray-500 p-4">No chats or requests yet. Start by searching for a user!</p>
                    ` : ''}
                    ${chats.map(chat => {
                        const partnerId = getPartnerId(chat);
                        const partner = state.users.find(u => u.id === partnerId);
                        const partnerPic = getProfilePicUrl(partner?.profilePic);
                        const isOnline = state.onlineUsers.has(partnerId);
                        
                        return `
                            <div onclick="navigateTo('chat', ${JSON.stringify(chat).replace(/"/g, '&quot;')})" 
                                class="flex items-center p-4 border-b border-gray-100 cursor-pointer hover:bg-gray-50 ${state.chat?.chatId === chat.chatId ? 'bg-gray-100' : ''}">
                                <div class="relative">
                                    <img src="${partnerPic}" alt="${chat.name}" class="w-12 h-12 rounded-full object-cover">
                                    <span class="absolute bottom-0 right-0 w-3 h-3 rounded-full ${isOnline ? 'bg-green-500' : 'bg-gray-400'} border-2 border-white"></span>
                                </div>
                                <div class="ml-3 flex-grow overflow-hidden">
                                    <p class="font-semibold text-gray-900 truncate">${chat.name}</p>
                                    <p class="text-sm text-gray-500 truncate">${chat.lastMessage}</p>
                                </div>
                            </div>
                        `;
                    }).join('')}
                </div>
                
                <input type="file" id="profile-pic-file" accept="image/jpeg,image/png,image/gif" class="hidden" onchange="uploadProfilePic(event)">
            </div>
        `;
    }

    function renderChat() {
        if (!state.chat || !state.user) return '';

        const partnerId = getPartnerId(state.chat);
        const partner = state.users.find(u => u.id === partnerId);
        const partnerPic = getProfilePicUrl(partner?.profilePic);
        const isOnline = state.onlineUsers.has(partnerId);
        
        return `
            <div class="flex flex-col h-full w-full">
                <div class="flex items-center p-4 border-b border-gray-200 bg-white shadow-sm">
                    <button onclick="navigateTo('dashboard')" class="md:hidden text-gray-600 mr-3 hover:text-blue-500"><i class="ph-arrow-left text-2xl"></i></button>
                    <div class="relative mr-3">
                         <img src="${partnerPic}" alt="${partner.name}" class="w-10 h-10 rounded-full object-cover">
                         <span class="absolute bottom-0 right-0 w-3 h-3 rounded-full ${isOnline ? 'bg-green-500' : 'bg-gray-400'} border-2 border-white"></span>
                    </div>
                    <div>
                        <p class="font-bold text-gray-900">${partner.name}</p>
                        <p class="text-xs ${isOnline ? 'text-green-500' : 'text-gray-500'}">${isOnline ? 'Online' : 'Offline'}</p>
                    </div>
                </div>

                <div id="chat-messages" class="flex-grow overflow-y-auto p-6 space-y-4 bg-gray-50">
                    ${state.chatMessages.map(msg => {
                        const isMine = msg.senderId === state.user.id;
                        const bubbleClass = isMine 
                            ? 'bg-blue-500 text-white ml-auto' 
                            : 'bg-white text-gray-800 mr-auto border border-gray-200';
                        
                        return `
                            <div class="flex ${isMine ? 'justify-end' : 'justify-start'}">
                                <div class="message-bubble ${bubbleClass}">
                                    <p class="text-xs font-bold ${isMine ? 'text-blue-200' : 'text-gray-500'}">${getUserNameById(msg.senderId)}</p>
                                    <p>${msg.text}</p>
                                    <p class="text-xs mt-1 ${isMine ? 'text-blue-300' : 'text-gray-400'} text-right">${new Date(msg.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}</p>
                                </div>
                            </div>
                        `;
                    }).join('')}
                </div>

                <form onsubmit="sendMessage(event)" class="p-4 bg-white border-t border-gray-200">
                    <div class="flex space-x-3">
                        <input type="text" id="message-input" placeholder="Type a message..." required class="flex-grow px-4 py-3 border border-gray-300 rounded-full focus:ring-blue-500 focus:border-blue-500">
                        <button type="submit" class="bg-blue-600 text-white p-3 rounded-full hover:bg-blue-700 transition">
                            <i class="ph-paper-plane-right text-xl"></i>
                        </button>
                    </div>
                </form>
            </div>
        `;
    }

    function renderSearch() {
        return `
            <div class="flex-grow flex flex-col p-6 space-y-6">
                <h2 class="text-3xl font-bold text-gray-900">Find New Friends</h2>
                
                <form onsubmit="performSearch(event)" class="flex space-x-3">
                    <input type="search" id="search-input" placeholder="Search by name or email..." class="flex-grow px-4 py-3 border border-gray-300 rounded-lg focus:ring-blue-500 focus:border-blue-500" value="${state.searchQuery}">
                    <button type="submit" class="bg-blue-600 text-white px-5 py-3 rounded-lg hover:bg-blue-700 transition">
                        <i class="ph-magnifying-glass text-xl"></i> Search
                    </button>
                </form>

                <div class="flex-grow overflow-y-auto space-y-3">
                    ${state.searchResults.length === 0 
                        ? `<p class="text-gray-500">${state.searchQuery ? `No users found for "${state.searchQuery}".` : 'Enter a name or email to find users.'}</p>`
                        : state.searchResults.map(user => `
                            <div class="flex items-center justify-between p-4 bg-white rounded-lg shadow-sm border border-gray-100">
                                <div>
                                    <p class="font-semibold text-gray-900">${user.name}</p>
                                    <p class="text-sm text-gray-500">${user.email}</p>
                                </div>
                                <button onclick="sendChatRequest('${user.id}')" class="bg-emerald-500 text-white px-4 py-2 rounded-lg hover:bg-emerald-600 transition text-sm">
                                    <i class="ph-handshake mr-1"></i> Send Request
                                </button>
                            </div>
                        `).join('')}
                </div>
            </div>
        `;
    }
    
    function renderVideoFeed() {
        const feedItems = state.videoFeed.map(post => `
            <div class="bg-white rounded-xl shadow-lg overflow-hidden border border-gray-100">
                <div class="p-4 border-b border-gray-100 flex items-center">
                    <img src="${getProfilePicUrl(state.users.find(u => u.id === post.posterId)?.profilePic)}" alt="${post.posterName}" class="w-8 h-8 rounded-full object-cover mr-3">
                    <p class="font-semibold text-gray-900">${post.posterName}</p>
                    <p class="text-sm text-gray-500 ml-auto">${new Date(post.timestamp).toLocaleDateString()}</p>
                </div>
                <video controls src="${post.url}" class="w-full h-auto object-cover max-h-96 bg-black"></video>
                <div class="p-4">
                    <p class="text-gray-700">${post.caption}</p>
                </div>
            </div>
        `).join('');

        return `
            <div class="flex-grow flex flex-col p-6 space-y-6">
                <h2 class="text-3xl font-bold text-gray-900">Video Feed</h2>
                
                <div class="p-4 bg-gray-100 rounded-lg">
                    <p class="font-semibold mb-2">Share a Video</p>
                    <form onsubmit="postVideo(event)" class="space-y-3">
                        <input type="file" id="video-file" accept="video/mp4,video/webm,video/quicktime" required class="w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100">
                        <textarea id="video-caption" placeholder="Caption (optional)" class="w-full px-3 py-2 border rounded-lg focus:ring-blue-500 focus:border-blue-500"></textarea>
                        <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 transition text-sm">
                            <i class="ph-upload-simple mr-1"></i> Post Video
                        </button>
                    </form>
                </div>

                <div class="flex-grow overflow-y-auto space-y-6 pr-2">
                    ${state.videoFeed.length === 0 ? '<p class="text-gray-500">No videos in the feed yet. Be the first to post!</p>' : feedItems}
                </div>
            </div>
        `;
    }
    
    function renderAdminDashboard() {
        const users = state.adminData || [];
        
        return `
            <div class="flex-grow flex flex-col p-6 space-y-6">
                <h2 class="text-3xl font-bold text-red-600">Admin Dashboard</h2>
                <p class="text-gray-600">Total Users: ${users.length}</p>

                <div class="flex-grow overflow-y-auto space-y-3">
                    ${users.length === 0 ? '<p class="text-gray-500">Loading user data...</p>' : users.map(user => `
                        <div class="flex items-center justify-between p-3 bg-white rounded-lg shadow-sm border border-gray-100">
                            <div>
                                <p class="font-semibold text-gray-900">${user.name} ${user.isAdmin ? '(Admin)' : ''}</p>
                                <p class="text-sm text-gray-500">${user.email} (${user.id.substring(0, 8)}...)</p>
                            </div>
                            <button onclick="deleteUser('${user.id}')" class="text-white bg-red-500 px-3 py-1 rounded-lg hover:bg-red-600 transition text-sm">
                                <i class="ph-trash"></i> Delete
                            </button>
                        </div>
                    `).join('')}
                </div>
            </div>
        `;
    }

    function renderApp() {
        if (state.view === 'loading') {
            appEl.innerHTML = renderLoading();
            return;
        }

        if (state.view === 'auth') {
            appEl.innerHTML = renderAuth();
            return;
        }

        // --- Authenticated Views (Dashboard, Chat, Search, Feed, Admin) ---
        const mainContent = `
            <div id="main-content-area" class="flex-grow h-full bg-gray-50 overflow-hidden ${state.view === 'chat' && window.innerWidth < 768 ? 'w-full' : (window.innerWidth < 768 && state.view !== 'chat' ? 'hidden' : 'flex-grow')}">
                ${state.view === 'dashboard' ? renderSearch() : ''}
                ${state.view === 'search' ? renderSearch() : ''}
                ${state.view === 'chat' ? renderChat() : ''}
                ${state.view === 'feed' ? renderVideoFeed() : ''}
                ${state.view === 'admin' ? renderAdminDashboard() : ''}
            </div>
        `;

        // Mobile logic: show only sidebar or only chat/content
        if (window.innerWidth < 768) {
             if (state.view === 'chat') {
                appEl.innerHTML = mainContent;
            } else {
                 appEl.innerHTML = renderSidebar() + mainContent;
                 // On mobile, hide main content unless it's the chat view
                 document.getElementById('main-content-area')?.classList.add('hidden');
            }
        } else {
            // Desktop: always show both sidebar and main content
            appEl.innerHTML = renderSidebar() + mainContent;
        }

        // Scroll to bottom after rendering chat
        if (state.view === 'chat') {
            scrollToBottom();
        }
    }

    // =======================================================================
    // --- Application Entry Point ---
    // =======================================================================
    function checkSession() {
        const accepted = localStorage.getItem('tos_accepted');

        if (accepted !== 'true') {
            // Show TOS modal on first visit
            showTermsOfServiceModal();
            return; // Halt loading until accepted
        }
        
        // Assume user object would be loaded from a stored session token here in a real app
        // For this example, we proceed to auth if state.user is null
        if (!state.user) {
            navigateTo('auth');
        } else {
            // Re-fetch data on load if a user object exists
            fetchDashboardData();
            fetchVideoFeed(); 
            connectSocket();
            navigateTo('dashboard');
        }
    }
    
    window.onload = checkSession;
</script>
</body>
</html>
